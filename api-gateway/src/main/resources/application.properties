spring.application.name=api-gateway
server.port=6063

spring.cloud.gateway.routes[0].id=quiz-service-questions
spring.cloud.gateway.routes[0].uri=http://localhost:6060
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/questions/**

spring.cloud.gateway.routes[1].id=quiz-service-quizzes
spring.cloud.gateway.routes[1].uri=http://localhost:6060
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/quizzes/**

spring.cloud.gateway.routes[2].id=attempt-service
spring.cloud.gateway.routes[2].uri=http://localhost:6061
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/attempts/**

spring.cloud.gateway.routes[3].id=auth-service
spring.cloud.gateway.routes[3].uri=http://localhost:9090
spring.cloud.gateway.routes[3].predicates[0]=Path=/auth/**
jwt.secret=mydevsecretmydevsecretmydevsecret1234567890
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty=DEBUG

spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOriginPatterns=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true