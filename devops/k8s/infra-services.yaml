apiVersion: v1
kind: ConfigMap
metadata:
  name: config-server-files
data:
  application.properties: |
    eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
    eureka.client.register-with-eureka=true
    eureka.client.fetch-registry=true
    eureka.instance.prefer-ip-address=true
    management.endpoints.web.exposure.include=*
    management.endpoint.health.show-details=always
    management.tracing.sampling.probability=1.0
    management.zipkin.tracing.endpoint=http://zipkin:9411/api/v2/spans
    resilience4j.circuitbreaker.configs.default.registerHealthIndicator=true
    resilience4j.circuitbreaker.configs.default.slidingWindowSize=10
    resilience4j.circuitbreaker.configs.default.minimumNumberOfCalls=5
    resilience4j.circuitbreaker.configs.default.failureRateThreshold=50.0
    resilience4j.circuitbreaker.configs.default.waitDurationInOpenState=10s
    resilience4j.circuitbreaker.configs.default.permittedNumberOfCallsInHalfOpenState=3
    resilience4j.circuitbreaker.configs.default.automaticTransitionFromOpenToHalfOpenEnabled=true
    resilience4j.retry.configs.default.maxAttempts=3
    resilience4j.retry.configs.default.waitDuration=2s
    resilience4j.retry.configs.default.enableExponentialBackoff=true
    resilience4j.retry.configs.default.exponentialBackoffMultiplier=2
    resilience4j.ratelimiter.configs.default.limitForPeriod=50
    resilience4j.ratelimiter.configs.default.limitRefreshPeriod=1s
    resilience4j.ratelimiter.configs.default.timeoutDuration=500ms
    resilience4j.bulkhead.configs.default.maxConcurrentCalls=10
    resilience4j.bulkhead.configs.default.maxWaitDuration=10ms

  api-gateway.properties: |
    server.port=6063
    spring.cloud.gateway.routes[0].id=auth-service
    spring.cloud.gateway.routes[0].uri=lb://auth-service
    spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**
    spring.cloud.gateway.routes[1].id=quiz-service-questions
    spring.cloud.gateway.routes[1].uri=lb://quiz-service
    spring.cloud.gateway.routes[1].predicates[0]=Path=/api/questions/**
    spring.cloud.gateway.routes[2].id=quiz-service-quizzes
    spring.cloud.gateway.routes[2].uri=lb://quiz-service
    spring.cloud.gateway.routes[2].predicates[0]=Path=/api/quizzes/**
    spring.cloud.gateway.routes[3].id=ai-service-route
    spring.cloud.gateway.routes[3].uri=lb://ai-service
    spring.cloud.gateway.routes[3].predicates[0]=Path=/api/ai/**
    spring.cloud.gateway.routes[4].id=attempt-service
    spring.cloud.gateway.routes[4].uri=lb://attempt-service
    spring.cloud.gateway.routes[4].predicates[0]=Path=/api/attempts/**
    spring.cloud.gateway.routes[5].id=competition-service
    spring.cloud.gateway.routes[5].uri=lb://competition-service
    spring.cloud.gateway.routes[5].predicates[0]=Path=/api/competitions/**
    spring.cloud.gateway.routes[6].id=competition-websocket
    spring.cloud.gateway.routes[6].uri=lb://competition-service
    spring.cloud.gateway.routes[6].predicates[0]=Path=/ws/**
    spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOriginPatterns=*
    spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
    spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
    spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true
    jwt.secret=mydevsecretmydevsecretmydevsecret1234567890

  auth-service.properties: |
    server.port=9090
    spring.datasource.url=jdbc:postgresql://postgres:5432/auth_core
    spring.datasource.username=postgres
    spring.datasource.password=postgresql
    spring.datasource.driver-class-name=org.postgresql.Driver
    spring.jpa.hibernate.ddl-auto=update
    spring.jpa.show-sql=true
    spring.data.redis.host=redis
    spring.data.redis.port=6379
    spring.mail.host=smtp.gmail.com
    spring.mail.port=587
    spring.mail.username=kartikkamatkar98@gmail.com
    spring.mail.password=krthbyifxuparwlo
    spring.mail.properties.mail.smtp.auth=true
    spring.mail.properties.mail.smtp.starttls.enable=true
    jwt.secret=mydevsecretmydevsecretmydevsecret1234567890

  quiz-service.properties: |
    server.port=6060
    spring.datasource.url=jdbc:postgresql://postgres:5432/quizly
    spring.datasource.username=postgres
    spring.datasource.password=postgresql
    spring.jpa.hibernate.ddl-auto=update
    spring.jpa.show-sql=true
    spring.cloud.openfeign.circuitbreaker.enabled=true

  attempt-service.properties: |
    server.port=6061
    spring.datasource.url=jdbc:postgresql://postgres:5432/quizly
    spring.datasource.username=postgres
    spring.datasource.password=postgresql
    spring.jpa.hibernate.ddl-auto=update
    spring.jpa.show-sql=true
    spring.data.redis.host=redis
    spring.data.redis.port=6379

  competition-service.properties: |
    server.port=6062
    spring.datasource.url=jdbc:postgresql://postgres:5432/quizly
    spring.datasource.username=postgres
    spring.datasource.password=postgresql
    spring.jpa.hibernate.ddl-auto=update
    spring.jpa.show-sql=true

  ai-service.properties: |
    server.port=6065
    spring.ai.openai.api-key=${OPENAI_API_KEY:mock-key-12345}
    spring.ai.openai.chat.options.model=gpt-3.5-turbo
    spring.ai.qdrant.host=qdrant
    spring.ai.qdrant.port=6334
    spring.ai.qdrant.api-key=${QDRANT_API_KEY:}
    spring.ai.qdrant.collection-name=quizly-knowledge
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-server
  template:
    metadata:
      labels:
        app: config-server
    spec:
      containers:
        - name: config-server
          image: com.quizly/config-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8888
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: native
            - name: SPRING_CLOUD_CONFIG_SERVER_NATIVE_SEARCH_LOCATIONS
              value: file:/app/config-repo
          volumeMounts:
            - name: config-volume
              mountPath: /app/config-repo
      volumes:
        - name: config-volume
          configMap:
            name: config-server-files
---
apiVersion: v1
kind: Service
metadata:
  name: config-server
spec:
  ports:
    - port: 8888
  selector:
    app: config-server
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eureka-server
  template:
    metadata:
      labels:
        app: eureka-server
    spec:
      containers:
        - name: eureka-server
          image: com.quizly/eureka-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8761
          env:
            - name: SPRING_CONFIG_IMPORT
              value: "optional:configserver:http://config-server:8888"
            - name: EUREKA_INSTANCE_HOSTNAME
              value: "eureka-server"
      initContainers:
        - name: wait-for-config-server
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z config-server 8888; do echo waiting for config-server; sleep 2; done;']
---
apiVersion: v1
kind: Service
metadata:
  name: eureka-server
spec:
  ports:
    - port: 8761
  selector:
    app: eureka-server
